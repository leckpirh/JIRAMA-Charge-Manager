<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hors ligne - JIRAMA Charge Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .offline-container {
            text-align: center;
            max-width: 500px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .offline-icon {
            font-size: 80px;
            color: #ff6b6b;
            margin-bottom: 20px;
        }
        
        h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 15px;
        }
        
        p {
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .btn-retry {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        
        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }
        
        .saved-data {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .saved-data p {
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .data-info {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }
        
        .data-info div {
            text-align: center;
        }
        
        .data-info .number {
            font-size: 24px;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .data-info .label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .fa, .fas, .far {
            font-family: 'Font Awesome 6 Free';
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <i class="fas fa-wifi"></i>
        </div>
        <h1>Vous êtes hors ligne</h1>
        <p>Vous n'êtes pas connecté à Internet.<br>
        L'application utilise les données en cache.</p>
        
        <button class="btn-retry" onclick="retryConnection()">
            <i class="fas fa-sync-alt"></i> Vérifier la connexion
        </button>
        
        <div class="saved-data" id="savedDataInfo">
            <p><i class="fas fa-database"></i> Données disponibles hors ligne :</p>
            <div class="data-info" id="dataInfo">
                <div>
                    <div class="number" id="personsCount">0</div>
                    <div class="label">Colocataires</div>
                </div>
                <div>
                    <div class="number" id="appliancesCount">0</div>
                    <div class="label">Appareils</div>
                </div>
                <div>
                    <div class="number" id="historyCount">0</div>
                    <div class="label">Historique</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Afficher les informations de données en cache
        function displayCachedData() {
            const savedData = localStorage.getItem('jiramaChargeManager');
            if (savedData) {
                try {
                    const data = JSON.parse(savedData);
                    document.getElementById('personsCount').textContent = data.persons ? data.persons.length : 0;
                    document.getElementById('appliancesCount').textContent = data.appliances ? data.appliances.length : 0;
                    document.getElementById('historyCount').textContent = data.history ? data.history.length : 0;
                } catch(e) {
                    console.error('Erreur lecture données:', e);
                }
            }
        }
        
        // Vérifier la connexion et recharger
        function retryConnection() {
            if (navigator.onLine) {
                window.location.href = '/';
            } else {
                alert('Toujours pas de connexion. Veuillez vérifier votre réseau.');
            }
        }
        
        // Écouter le retour de connexion
        window.addEventListener('online', () => {
            window.location.href = '/';
        });
        
        // Afficher les données au chargement
        displayCachedData();
        
        // Mettre à jour les données toutes les 5 secondes
        setInterval(displayCachedData, 5000);
    </script>
</body>
</html>
